<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Interactivity</title>
  </head>
  <body>
    <!-- Hover State Styling -->
    <button
      class="w-36 h-16 p-4 m-4 rounded-2xl bg-black text-white transition-all hover:bg-blue-500 hover:text-white-500"
    >
      Submit
    </button>
    <!-- Focus State Styling -->
    <button
      class="w-36 h-16 p-4 m-4 rounded-2xl bg-black text-white transition-all focus:bg-green-500 focus:text-white-500"
    >
      Submit
    </button>
    <!-- Active State Styling -->
    <button
      class="w-36 h-16 p-4 m-4 rounded-2xl bg-black text-white transition-all active:bg-orange-400 active:text-white-500"
    >
      Submit
    </button>
    <!-- Styling based on parent state -->
    <div class="group w-64 h-24 rounded-2xl shadow-2xl bg-cyan-400 p-4 mx-auto">
      <p class="text-black group-hover:text-white">
        hover on my parent
        <span class="group-hover:text-red-500"
          >,hover the parent of my parent...</span
        >
      </p>
    </div>
    <!-- Pseudo Classes -->
    <ul>
      <li class="first:bg-amber-200 even:bg-blue-500/50 odd:bg-green-500/50">
        item 1
      </li>
      <li class="first:bg-amber-200 even:bg-blue-500/50 odd:bg-green-500/50">
        item 2
      </li>
      <li class="first:bg-amber-200 even:bg-blue-500/50 odd:bg-green-500/50">
        item 3
      </li>
      <li class="first:bg-amber-200 even:bg-blue-500/50 odd:bg-green-500/50">
        item 4
      </li>
      <li class="first:bg-amber-200 even:bg-blue-500/50 odd:bg-green-500/50">
        item 5
      </li>
    </ul>

    <!-- Appearance -->
    <!-- Use appearance-none to reset any browser specific styling on an element. This utility is often used when creating custom form components. -->

    <!-- Cursor -->

    <!-- Resize -->

    <!-- User Select -->
    <p class="select-none">Lorem ipsum dolor sit amet.</p>
    <p class="select-text">Lorem ipsum dolor sit amet.</p>
    <p class="select-all">Lorem ipsum dolor sit amet.</p>
    <!-- Smooth Scroll Example -->
     <!-- you can add the utility class scroll-smooth in the html tag -->
  </body>
</html>
